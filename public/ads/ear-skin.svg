<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="피부 귀 건강 사료">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#glow)"/>
  <g fill="#ffffff" opacity="0.16">
    <g transform="translate(90,110) scale(1.1)"><ellipse cx="0" cy="15" rx="17" ry="14"/><ellipse cx="-17" cy="-7" rx="6.5" ry="9"/><ellipse cx="-6" cy="-17" rx="6.5" ry="9"/><ellipse cx="6" cy="-17" rx="6.5" ry="9"/><ellipse cx="17" cy="-7" rx="6.5" ry="9"/></g>
    <g transform="translate(510,150) scale(0.8) rotate(20)"><ellipse cx="0" cy="15" rx="17" ry="14"/><ellipse cx="-17" cy="-7" rx="6.5" ry="9"/><ellipse cx="-6" cy="-17" rx="6.5" ry="9"/><ellipse cx="6" cy="-17" rx="6.5" ry="9"/><ellipse cx="17" cy="-7" rx="6.5" ry="9"/></g>
    <g transform="translate(120,500) scale(0.9) rotate(-15)"><ellipse cx="0" cy="15" rx="17" ry="14"/><ellipse cx="-17" cy="-7" rx="6.5" ry="9"/><ellipse cx="-6" cy="-17" rx="6.5" ry="9"/><ellipse cx="6" cy="-17" rx="6.5" ry="9"/><ellipse cx="17" cy="-7" rx="6.5" ry="9"/></g>
    <g transform="translate(500,500) scale(1) rotate(10)"><ellipse cx="0" cy="15" rx="17" ry="14"/><ellipse cx="-17" cy="-7" rx="6.5" ry="9"/><ellipse cx="-6" cy="-17" rx="6.5" ry="9"/><ellipse cx="6" cy="-17" rx="6.5" ry="9"/><ellipse cx="17" cy="-7" rx="6.5" ry="9"/></g>
  </g>
  <circle cx="300" cy="300" r="120" fill="#ffffff" opacity="0.92"/>
  <!-- floppy ears -->
  <ellipse cx="232" cy="312" rx="30" ry="62" transform="rotate(-12 232 312)" fill="#b45309"/>
  <ellipse cx="368" cy="312" rx="30" ry="62" transform="rotate(12 368 312)" fill="#b45309"/>
  <!-- head -->
  <circle cx="300" cy="300" r="74" fill="#f59e0b"/>
  <!-- eyes -->
  <circle cx="276" cy="290" r="12" fill="#ffffff"/><circle cx="276" cy="292" r="5.5" fill="#7c2d12"/>
  <circle cx="324" cy="290" r="12" fill="#ffffff"/><circle cx="324" cy="292" r="5.5" fill="#7c2d12"/>
  <!-- muzzle + nose -->
  <ellipse cx="300" cy="330" rx="26" ry="20" fill="#fcd34d"/>
  <ellipse cx="300" cy="322" rx="9" ry="7" fill="#7c2d12"/>
  <path d="M300 329 v10" stroke="#7c2d12" stroke-width="4" stroke-linecap="round"/>
